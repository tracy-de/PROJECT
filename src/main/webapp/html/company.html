<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../upload/cake0.png" type="image/x-icon">
    <link rel="shortcut icon" href="../upload/cake0.png" type="image/x-icon">
    <title>Whisk & Whimsy 賣方資料</title>
    <link rel="stylesheet" href="../css/company.css">

</head>
<body>
   
    <span class="main_bg"></span>
    <div class="container">
 
        <section class="front">
            <img src="../upload/company.png" alt="image">
            <div>
                <p>賣方信箱帳號</p>
                <div id="mailmsg"></div>
            </div>
        </section>

        <section class="main">
            <div>
                <ul class="btns">
                    <li class="btn">公司資訊</li>
                    <li class="btn">訂單管理</li>
                    <li class="btn">商品管理</li>
                    <li class="backhome">返回首頁</li>
                    <li class="logoutbtn">登出</li>
                </ul>

                <div> <!--顯示公司資訊頁面-->
                    <div class="details active">
                        <div class="present">
                            <h3>公司資訊</h3>
                            <button class="edit-btn">編輯公司資訊</button>
                            <ul>
                                <li>公司名稱:<span id="namemsg"></span></li>
                                <li>統編:<span id="idmsg"></span></li>
                                <li>電話:<span id="telmsg"></span></li>
                                <li>地址:<span id="addrmsg"></span></li> 
                                <li>分類:<span id="typemsg"></span></li>  
                            </ul>                                               
                        </div>

                        <div class="edit"><!--編輯公司資訊頁面-->
                        <form action="../Editcompany" method="post">
                            <p>請填寫個人資訊</p>
                            <label for="name">姓名
                            <input type="text" name="name" id="name" required>
                            </label><br>
                            <label for="id">統編
                                <input type="text" name="id" id="id" required>
                                </label><br>
                            <label for="number">電話
                                <input type="tel" name="number" id="number" required>
                            </label><br>
                            <label for="addr">地址
                                <input type="text" name="addr" id="addr" required>
                            </label><br>
                              <label for="type">類別
                                <input type="text" name="type" id="type" required>
                            </label>
                            <button class="submit-btn">填寫完成</button>
                        </form>
                        </div>
                    </div>

                    <div class="details"><!--顯示訂單資訊頁面-->
                        <div class=""></div>
                            <h3>訂單管理</h3>
							<p>
                                <table>
                                    <thead>
                                        <tr>
                                        	<th>日期</th>                                        
		                                    <th>訂單編號</th>
		                                    <th>商品名稱</th>		                                    
		                                    <th>金額</th>
		                                    <th>數量</th>
		                                    <th>小計</th>
		                                    <th>狀態</th>
                                        </tr>
                                    </thead>
                                    <tbody id=data>
                                      
                                    </tbody>
                                </table>
                            </p>  
                           
                     
                    </div>

                    
                    <div class="details"><!--編輯商品資訊頁面-->
                        <div class=""></div>
                            <h3>商品管理</h3>

                            <form action="../editproduct" method="post" enctype="multipart/form-data">

                                <label for="pro_photo">照片</label>
                                <input type="file" name="pro_photo">
                                <button class="addbtn">新增</button><br>
                                <label for="pro_no">商品編號</label>
                      			<input type="text" name="pro_no"><br>
                      			<label for="pro_name">商品名稱</label>
                      			<input type="text" name="pro_name"><br>
                                <label for="pro_price">金額</label>
                      			<input type="text" name="pro_price"><br>
                      			<label for="pro_status">狀態</label>
                      			<input type="text" name="pro_status"><br>

                            </form>
                            <!--顯示商品資訊頁面-->
							<p>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>照片</th>	
                                        	<th>商品編號</th>        
		                                    <th>商品名稱</th>		                                    
		                                    <th>金額</th>
		                                    <th>上架日</th>
                                            <th>狀態</th>
                                        </tr>
                                    </thead>
                                    <tbody id=data2>
                                      
                                    </tbody>
                                </table>
                            </p>  
                           
                     
                    </div>

                </div>

            </div>
        </section>
        
    </div>

    <script src="../js/company.js" defer></script>
</body>
</html>
